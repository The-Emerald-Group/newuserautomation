name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish app (win-x64)
        shell: pwsh
        run: |
          ./scripts/publish.ps1 -Runtime win-x64 -Configuration Release -ZipOutput

      - name: Publish installer EXE (win-x64)
        shell: pwsh
        run: |
          dotnet publish ./scripts/InstallerLauncher/InstallerLauncher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ./dist/installer

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NewUserAutomation-win-x64.zip
            dist/installer/NewUserAutomationInstaller.exe
